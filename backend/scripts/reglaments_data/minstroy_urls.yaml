# Минстрой URL-ы для batch-наполнения нормативной базы из PDF.
#
# Формат:
#   - doc_type / doc_number — должны совпадать с записью в `reglaments`
#   - minstroy_page — URL страницы документа (получен через WebSearch)
#   - pdf_hint — опционально: ожидаемое имя PDF (например "SP-63.pdf").
#     Если не указано — скрипт ищет `SP-{number_short}.pdf` в HTML по regex.
#
# URL'ы собраны через `site:minstroyrf.gov.ru "СП X.13330.YYYY"` и
# подтверждены ручной проверкой первого результата.

